<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Photo - 管理ページ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap');

  :root {
    --cream: #FAF8F3;
    --beige: #F2EDE4;
    --beige2: #E8E0D4;
    --gold: #B8915A;
    --gold-light: #E8D5B0;
    --dark: #2C2118;
    --mid: #6B5744;
    --sub: #9A876F;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--cream); font-family: 'Zen Kaku Gothic New', sans-serif; color: var(--dark); min-height: 100vh; }

  .header { text-align: center; padding: 40px 20px 30px; border-bottom: 1px solid var(--beige2); }
  .header-ornament { font-family: 'Cormorant Garamond', serif; font-size: 12px; letter-spacing: 10px; color: var(--gold); margin-bottom: 6px; }
  .header-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300; color: var(--dark); letter-spacing: 3px; margin-bottom: 4px; }
  .header-sub { font-size: 12px; color: var(--sub); letter-spacing: 1px; }

  .container { max-width: 800px; margin: 0 auto; padding: 30px 20px 60px; }

  /* STATS */
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 30px; }
  .stat-card { background: var(--beige); border-radius: 8px; padding: 16px; text-align: center; }
  .stat-n { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 300; color: var(--dark); line-height: 1; }
  .stat-l { font-size: 11px; color: var(--sub); margin-top: 4px; letter-spacing: 0.5px; }

  /* DOWNLOAD SECTION */
  .section { background: #fff; border: 1px solid var(--beige2); border-radius: 10px; padding: 24px; margin-bottom: 20px; }
  .section-title { font-size: 14px; font-weight: 500; color: var(--dark); margin-bottom: 6px; letter-spacing: 1px; }
  .section-desc { font-size: 12px; color: var(--sub); line-height: 1.8; margin-bottom: 18px; }

  .btn-download {
    width: 100%; padding: 16px;
    background: var(--gold); color: #fff;
    border: none; border-radius: 6px; cursor: pointer;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 14px; letter-spacing: 2px;
    transition: opacity 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-download:hover { opacity: 0.9; }
  .btn-download:disabled { opacity: 0.4; cursor: not-allowed; }

  .progress-wrap { margin-top: 16px; display: none; }
  .progress-wrap.show { display: block; }
  .progress-bar-bg { background: var(--beige2); border-radius: 4px; height: 6px; overflow: hidden; margin-bottom: 8px; }
  .progress-bar { height: 100%; background: var(--gold); border-radius: 4px; transition: width 0.3s; width: 0%; }
  .progress-text { font-size: 12px; color: var(--sub); text-align: center; }

  /* GALLERY PREVIEW */
  .gallery-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .gallery-filter { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn { padding: 5px 12px; border: 1px solid var(--beige2); border-radius: 20px; background: var(--beige); color: var(--mid); font-size: 11px; cursor: pointer; font-family: 'Zen Kaku Gothic New', sans-serif; transition: all 0.15s; }
  .filter-btn.active { background: var(--gold); color: #fff; border-color: var(--gold); }

  .photo-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  @media (max-width: 500px) { .photo-grid { grid-template-columns: repeat(3, 1fr); } }

  .photo-item { aspect-ratio: 1; border-radius: 6px; overflow: hidden; position: relative; cursor: pointer; background: var(--beige2); }
  .photo-item img { width: 100%; height: 100%; object-fit: cover; }
  .photo-item .p-meta { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.5)); padding: 12px 4px 4px; font-size: 9px; color: rgba(255,255,255,0.9); text-align: center; }

  .loading { padding: 40px; text-align: center; color: var(--sub); font-size: 13px; }
  .empty { padding: 40px; text-align: center; color: var(--sub); font-size: 13px; line-height: 2; }

  /* LIGHTBOX */
  .lightbox { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(20,14,8,0.94); flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 100%; max-height: 75vh; border-radius: 4px; }
  .lb-meta { color: rgba(255,255,255,0.5); font-size: 11px; margin-top: 10px; }
  .lb-close { position: absolute; top: 18px; right: 18px; background: rgba(255,255,255,0.1); border: none; color: #fff; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 18px; }
  .lb-dl { margin-top: 14px; padding: 8px 20px; background: var(--gold); color: #fff; border: none; border-radius: 20px; cursor: pointer; font-size: 12px; font-family: 'Zen Kaku Gothic New', sans-serif; }

  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--dark); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 12px; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 300; white-space: nowrap; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <div class="header-ornament">✦ &nbsp; ✦ &nbsp; ✦</div>
  <div class="header-title">Wedding Photo 管理ページ</div>
  <div class="header-sub">Saaya &amp; Toshiki · 運営専用</div>
</div>

<div class="container">

  <!-- 統計 -->
  <div class="stats" id="stats">
    <div class="stat-card"><div class="stat-n" id="stat-total">—</div><div class="stat-l">合計枚数</div></div>
    <div class="stat-card"><div class="stat-n" id="stat-tables">—</div><div class="stat-l">テーブル数</div></div>
    <div class="stat-card"><div class="stat-n" id="stat-size">—</div><div class="stat-l">概算サイズ</div></div>
  </div>

  <!-- ZIPダウンロード -->
  <div class="section">
    <div class="section-title">📦 全写真をZIPでダウンロード</div>
    <div class="section-desc">
      全員が撮影した写真をまとめてZIPファイルでダウンロードします。<br>
      写真枚数によって数分かかる場合があります。
    </div>
    <button class="btn-download" id="zip-btn" onclick="downloadZip()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      全写真をまとめてダウンロード
    </button>
    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar" id="progress-bar"></div></div>
      <div class="progress-text" id="progress-text">準備中...</div>
    </div>
  </div>

  <!-- 写真一覧 -->
  <div class="section">
    <div class="gallery-header">
      <div class="section-title">🖼 写真一覧</div>
      <div class="gallery-filter" id="filter-btns">
        <button class="filter-btn active" onclick="filterPhotos('all', this)">すべて</button>
      </div>
    </div>
    <div class="photo-grid" id="photo-grid">
      <div class="loading" style="grid-column:1/-1">読み込み中...</div>
    </div>
  </div>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLb(event)">
  <button class="lb-close" onclick="closeLb()">✕</button>
  <img id="lb-img" src="" alt="写真拡大">
  <div class="lb-meta" id="lb-meta"></div>
  <button class="lb-dl" onclick="downloadSingle()">この写真をダウンロード</button>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
  let allPhotos = [];
  let currentFilter = 'all';
  let lbIndex = 0;

  // 写真を取得
  async function loadPhotos() {
    try {
      const res = await fetch('/api/photos');
      const data = await res.json();
      allPhotos = data.photos || [];
      renderStats();
      renderFilterBtns();
      renderGrid('all');
    } catch(e) {
      document.getElementById('photo-grid').innerHTML = '<div class="empty">写真の取得に失敗しました。<br>しばらくしてから再読み込みしてください。</div>';
    }
  }

  function renderStats() {
    const tables = [...new Set(allPhotos.map(p => p.table))].length;
    const sizeMB = (allPhotos.length * 0.8).toFixed(1); // 1枚約0.8MBで概算
    document.getElementById('stat-total').textContent = allPhotos.length;
    document.getElementById('stat-tables').textContent = tables;
    document.getElementById('stat-size').textContent = sizeMB + 'MB';
  }

  function renderFilterBtns() {
    const tables = [...new Set(allPhotos.map(p => p.table))].sort();
    const wrap = document.getElementById('filter-btns');
    wrap.innerHTML = `<button class="filter-btn active" onclick="filterPhotos('all', this)">すべて</button>`;
    tables.forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.textContent = `テーブル${t}`;
      btn.onclick = function() { filterPhotos(t, this); };
      wrap.appendChild(btn);
    });
  }

  function filterPhotos(table, btn) {
    currentFilter = table;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid(table);
  }

  function renderGrid(table) {
    const photos = table === 'all' ? allPhotos : allPhotos.filter(p => p.table === table);
    const grid = document.getElementById('photo-grid');
    if (photos.length === 0) {
      grid.innerHTML = '<div class="empty" style="grid-column:1/-1">写真がありません</div>';
      return;
    }
    grid.innerHTML = photos.map((p, i) => `
      <div class="photo-item" onclick="openLb(${allPhotos.indexOf(p)})">
        <img src="${p.url}" alt="写真" loading="lazy">
        <div class="p-meta">T${p.table}-${p.seat}<br>${p.time}</div>
      </div>
    `).join('');
  }

  // ライトボックス
  function openLb(i) {
    lbIndex = i;
    const p = allPhotos[i];
    document.getElementById('lb-img').src = p.url;
    document.getElementById('lb-meta').textContent = `テーブル${p.table} · 席${p.seat} · ${p.time}`;
    document.getElementById('lightbox').classList.add('open');
  }
  function closeLb(e) {
    if (!e || e.target === document.getElementById('lightbox') || e.target.classList.contains('lb-close')) {
      document.getElementById('lightbox').classList.remove('open');
    }
  }

  // 1枚ダウンロード
  async function downloadSingle() {
    const p = allPhotos[lbIndex];
    try {
      const res = await fetch(p.url);
      const blob = await res.blob();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `wedding_T${p.table}_${p.seat}_${p.time.replace(':', '')}.jpg`;
      a.click();
    } catch(e) {
      // CORSエラーの場合は別タブで開く
      window.open(p.url, '_blank');
    }
  }

  // ZIPダウンロード
  async function downloadZip() {
    if (allPhotos.length === 0) { toast('写真がありません'); return; }

    const btn = document.getElementById('zip-btn');
    const progressWrap = document.getElementById('progress-wrap');
    const progressBar = document.getElementById('progress-bar');
    const progressText = document.getElementById('progress-text');

    btn.disabled = true;
    progressWrap.classList.add('show');

    const zip = new JSZip();
    const folder = zip.folder('wedding_photos');

    for (let i = 0; i < allPhotos.length; i++) {
      const p = allPhotos[i];
      const pct = Math.round((i / allPhotos.length) * 80);
      progressBar.style.width = pct + '%';
      progressText.textContent = `写真を取得中... ${i + 1} / ${allPhotos.length}`;

      try {
        const res = await fetch(p.url);
        const blob = await res.blob();
        const filename = `T${p.table}_${p.seat}_${String(i+1).padStart(3,'0')}.jpg`;
        folder.file(filename, blob);
      } catch(e) {
        console.warn('取得失敗:', p.url);
      }
    }

    progressBar.style.width = '90%';
    progressText.textContent = 'ZIPを作成中...';

    try {
      const content = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE' });
      progressBar.style.width = '100%';
      progressText.textContent = '完了！ダウンロードを開始します';

      const today = new Date().toLocaleDateString('ja-JP').replace(/\//g, '-');
      const a = document.createElement('a');
      a.href = URL.createObjectURL(content);
      a.download = `wedding_photos_${today}.zip`;
      a.click();
    } catch(e) {
      toast('ZIPの作成に失敗しました');
    }

    setTimeout(() => {
      btn.disabled = false;
      progressWrap.classList.remove('show');
      progressBar.style.width = '0%';
    }, 3000);
  }

  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
  }

  loadPhotos();
</script>
</body>
</html>
